name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          # Cross-compile the Intel-mac binary on the Apple-Silicon runner;
          # GitHub's free macos-13 (Intel) runners are deprecated and queue
          # indefinitely.
          - target: x86_64-apple-darwin
            os: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install musl tools
        if: endsWith(matrix.target, '-musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Stage binary
        run: |
          cp "target/${{ matrix.target }}/release/claude-forge" \
             "claude-forge-${{ matrix.target }}"
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: claude-forge-${{ matrix.target }}
